<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VJISS | Student Registration</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 520px;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .company-name {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #2c5364;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2c5364;
            box-shadow: 0 0 0 2px rgba(44, 83, 100, 0.15);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .checkbox-group input {
            width: auto;
            margin-right: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2c5364;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #203a43;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="company-name">VJISS</div>
    <div class="subtitle">Innovating Student Solutions</div>

    <h2>Student Registration</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Student Name</label>
        <input type="text" name="student_name" required>

        <label>Student Email</label>
        <input type="email" name="student_email" required>

        <label>Student ID</label>
        <input type="text" name="student_id" required>

        <label>Student Password</label>
        <input type="password" name="student_password" required>

        <label>Student DOB</label>
        <input type="date" name="student_dob" required>

        <label>Exam Date</label>
        <input type="date" name="exam_date" required>

        <div class="checkbox-group">
            <input type="checkbox" name="is_active" checked>
            <label>Is Active</label>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="footer-text">
        © 2026 VJISS. All rights reserved.
    </div>
</div>

</body>
</html>
